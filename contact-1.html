<!DOCTYPE html>

<head>

<title>Cultcha</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;400;700&display=swap');

html { scroll-behavior: smooth; }

.blur-bg { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

.text-outline {
text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}

.album-cover {
transition: all 0.3s ease;
filter: grayscale(30%);
}

.album-cover:hover {
transform: scale(1.05);
filter: grayscale(0%);
}

nav.scrolled-down { transform: translateY(-100%); }
nav.scrolled-up { transform: translateY(0); }

.grain-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: url(Assets/grain\ bgd.svg);
opacity: 0.07;
pointer-events: none;
z-index: 100;
}

/* Contact Form Styling */

.contact-form-container {
max-width: 600px;
margin: auto;
background: rgba(0,0,0,0.7);
padding: 30px;
border-radius: 14px;
border: 1px solid #333;
}

.contact-form-container input,
.contact-form-container textarea {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border-radius: 8px;
border: 1px solid #333;
background: #111;
color: white;
}

.contact-form-container input:focus,
.contact-form-container textarea:focus {
outline: none;
border-color: #ff0000;
}

.contact-form-container button {
background: #ff0000;
color: white;
padding: 12px 25px;
border: none;
border-radius: 10px;
cursor: pointer;
font-size: 1rem;
width: 100%;
}

.contact-form-container button:hover {
background: #ff5555;
}
</style>
</head>

<body class="bg-black text-white font-['Space_Grotesk'] overflow-x-hidden relative">

<div id="vanta-bg" class="fixed inset-0 z-0"></div>
<div class="grain-overlay"></div>

<!-- Navigation -->

<nav class="fixed top-0 left-0 w-full z-50 blur-bg bg-black bg-opacity-50 transition-transform duration-300">

<div class="container mx-auto px-4 py-3 flex justify-between items-center">

<a href="#"><img src="Assets/logo.jpg" alt="Cultcha Logo" class="h-12"></a>

<div class="hidden md:flex space-x-8">
<a href="index.html" class="text-white hover:text-red-500 transition">Home</a>
<a href="music.html" class="text-white hover:text-red-500 transition">Music</a>
<a href="merch.html" class="text-white hover:text-red-500 transition">Merch</a>
<a href="contact-1.html" class="text-white hover:text-red-500 transition">Contact</a>
</div>

<button class="md:hidden text-white">
<i data-feather="menu"></i>
</button>

</nav>

<main class="relative z-10">

<section id="contact" class="py-20 relative">

<div class="container mx-auto px-4">

<h2 class="text-4xl md:text-6xl mb-12 text-center">
JOIN THE MOVEMENT
</h2>

<div class="contact-form-container">

<form action="https://formspree.io/f/mqargend" method="POST">

<label for="name">Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="message">Message</label>
<textarea id="message" name="message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>
</section>

</main>

<!-- Footer -->

<footer class="py-8 blur-bg bg-black bg-opacity-80">

<div class="container mx-auto px-4 flex flex-col items-center space-y-4">

<div class="flex space-x-4">

<!-- TikTok -->

<a href="https://www.tiktok.com/@th3cultcha?_r=1&_t=ZN-94R1gliBreA" target="_blank" class="text-white hover:text-red-500 transition">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-6 h-6 fill-current">
<path d="M12.001 0c-6.627 0-12 5.373-12 12 0 6.628 5.373 12 12 12 6.626 0 12-5.372 12-12 0-6.627-5.374-12-12-12zm4.75 8.347v3.546c-.94.13-1.87.028-2.757-.306v5.5c0 2.95-2.39 5.35-5.344 5.35-2.955 0-5.346-2.4-5.346-5.35s2.391-5.35 5.346-5.35c.677 0 1.336.147 1.928.415v2.554c-.592-.214-1.227-.331-1.928-.331-1.99 0-3.61 1.62-3.61 3.61s1.62 3.61 3.61 3.61 3.611-1.62 3.611-3.61V6h2.75v2.347z"/>
</svg>

</a>

<!-- Instagram -->

</div>

<p class="text-sm text-gray-400">
© 2025 Clutch Fan Page
</p>

</div>

</footer>

<script>

VANTA.NET({
el:"#vanta-bg",
mouseControls:true,
touchControls:true,
gyroControls:false,
minHeight:200,
minWidth:200,
scale:1,
scaleMobile:1,
color:0xff0000,
backgroundColor:0x0,
points:12,
maxDistance:25,
spacing:18
});

feather.replace();

document.querySelectorAll('a[href^="#"]').forEach(anchor=>{
anchor.addEventListener('click',function(e){
e.preventDefault();
document.querySelector(this.getAttribute('href')).scrollIntoView({
behavior:'smooth'
});
});
});

let lastScroll=0;
const header=document.querySelector('nav');

window.addEventListener('scroll',()=>{

const currentScroll=window.pageYOffset;

if(currentScroll<=0){
header.classList.remove('scrolled-up');
header.classList.remove('scrolled-down');
return;
}

if(currentScroll>lastScroll && !header.classList.contains('scrolled-down')){
header.classList.remove('scrolled-up');
header.classList.add('scrolled-down');
}

else if(currentScroll<lastScroll && header.classList.contains('scrolled-down')){
header.classList.remove('scrolled-down');
header.classList.add('scrolled-up');
}

lastScroll=currentScroll;

});

</script>

</body>
</html>
